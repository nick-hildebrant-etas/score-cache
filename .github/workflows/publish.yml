name: Build, Test and Publish OCI Container

on:
  push:
    branches: [main]
    tags:     ['v*']
  pull_request:
    branches: [main]

env:
  REGISTRY:    ghcr.io
  IMAGE_OWNER: ${{ github.repository_owner }}

jobs:
  build-test:
    name: Build and test score-cache container
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install go-task
        uses: arduino/setup-task@v2
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to GHCR
        # Login on every event so that test pulls from the registry also work.
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and test score-cache container
        env:
          REGISTRY:    ${{ env.REGISTRY }}
          IMAGE_OWNER: ${{ env.IMAGE_OWNER }}
          IMAGE_TAG:   ${{ github.sha }}
        run: task score-cache:test

      - name: Push to GHCR
        # Only push on merge to main or a version tag — not on PR builds.
        if: >
          github.event_name == 'push' &&
          (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
        env:
          REGISTRY:    ${{ env.REGISTRY }}
          IMAGE_OWNER: ${{ env.IMAGE_OWNER }}
          IMAGE_TAG: >-
            ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || 'latest' }}
        run: task score-cache:push
