# All services run inside the same container — route to localhost ports.
# No Docker DNS resolver needed.

upstream nexus {
    server 127.0.0.1:8081;
    keepalive 32;
}

upstream bazel_remote {
    server 127.0.0.1:8080;
    keepalive 32;
}

# ── HTTP server ────────────────────────────────────────────────────────────────

server {
    listen  80;
    server_name  _;

    proxy_http_version      1.1;
    proxy_set_header        Host               $host;
    proxy_set_header        X-Real-IP          $remote_addr;
    proxy_set_header        X-Forwarded-For    $proxy_add_x_forwarded_for;
    proxy_set_header        X-Forwarded-Proto  $scheme;
    proxy_read_timeout      3600s;
    proxy_connect_timeout   60s;
    proxy_send_timeout      600s;
    proxy_buffering         off;
    client_max_body_size    0;

    # ── Cargo proxy (Rust / crate_universe) ──────────────────────────────────
    location /cargo/ {
        proxy_pass http://nexus/repository/cargo-proxy/;
    }

    # ── PyPI proxy (rules_python / pip / uv) ─────────────────────────────────
    location /pypi/ {
        proxy_pass http://nexus/repository/pypi-proxy/;
    }

    # ── OCI / Docker registry proxy ──────────────────────────────────────────
    location /v2/ {
        proxy_pass http://nexus/repository/oci-proxy/v2/;
        proxy_set_header  Docker-Distribution-API-Version  "registry/2.0";
        add_header        Docker-Distribution-API-Version  "registry/2.0"  always;
    }

    # ── Bazel rule-archive proxy (rules_go, rules_python, buildtools, …) ─────
    location /rules/ {
        proxy_pass http://nexus/repository/rules-proxy/;
    }

    # ── Nexus raw hosted repo — general push / pull for tests ─────────────────
    location /raw/ {
        proxy_pass http://nexus/repository/raw-hosted/;
    }

    # ── Nexus admin UI ────────────────────────────────────────────────────────
    location /nexus/ {
        proxy_pass http://nexus/;
    }

    # ── bazel-remote HTTP REAPI cache ─────────────────────────────────────────
    # bazel-remote serves at root (/cas/<h>, /ac/<h>, /status).
    # The trailing slash strips the /cache/ prefix before forwarding.
    location /cache/ {
        proxy_pass http://bazel_remote/;
    }

    # ── Health / readiness probe ──────────────────────────────────────────────
    location /health {
        access_log  off;
        return 200  "OK\n";
        add_header  Content-Type  text/plain;
    }
}

# ── gRPC server — bazel-remote REAPI gRPC ────────────────────────────────────

server {
    listen  9093 http2;
    server_name  _;

    grpc_connect_timeout  60s;
    grpc_read_timeout     3600s;
    grpc_send_timeout     3600s;

    location / {
        grpc_pass grpc://127.0.0.1:9092;
    }
}
