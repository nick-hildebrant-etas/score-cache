# ─── Docker-internal DNS resolver ────────────────────────────────────────────
# Using 127.0.0.11 (Docker's embedded DNS) with lazy variable-based proxy_pass
# prevents startup failures when upstream containers are still initialising.

resolver 127.0.0.11 valid=30s ipv6=off;
resolver_timeout 5s;

# ─── HTTP server — artifact proxy + bazel-remote HTTP cache ──────────────────

server {
    listen  80;
    server_name  _;

    proxy_http_version      1.1;
    proxy_set_header        Host               $host;
    proxy_set_header        X-Real-IP          $remote_addr;
    proxy_set_header        X-Forwarded-For    $proxy_add_x_forwarded_for;
    proxy_set_header        X-Forwarded-Proto  $scheme;
    proxy_read_timeout      3600s;
    proxy_connect_timeout   60s;
    proxy_send_timeout      600s;
    proxy_buffering         off;
    client_max_body_size    0;

    # Upstream addresses as variables enable lazy DNS resolution.
    set $nexus        "nexus:8081";
    set $bazel_remote "bazel-remote:8080";

    # ── Cargo proxy (Rust / crate_universe) ──────────────────────────────────
    location /cargo/ {
        proxy_pass http://$nexus/repository/cargo-proxy/;
    }

    # ── PyPI proxy (rules_python pip / uv) ───────────────────────────────────
    location /pypi/ {
        proxy_pass http://$nexus/repository/pypi-proxy/;
    }

    # ── OCI / Docker registry proxy ──────────────────────────────────────────
    # Clients hit /v2/ which is the Docker Distribution API root.
    location /v2/ {
        proxy_pass http://$nexus/repository/oci-proxy/v2/;
        proxy_set_header  Docker-Distribution-API-Version  "registry/2.0";
        add_header        Docker-Distribution-API-Version  "registry/2.0"  always;
    }

    # ── Bazel rule-archive proxy (rules_go, rules_python, buildtools, …) ─────
    # Nexus raw (proxy) repository caches HTTP archive downloads for Bazel rules.
    location /rules/ {
        proxy_pass http://$nexus/repository/rules-proxy/;
    }

    # ── Nexus admin UI (optional, for maintenance) ────────────────────────────
    location /nexus/ {
        proxy_pass http://$nexus/;
    }

    # ── bazel-remote HTTP REAPI cache ─────────────────────────────────────────
    location /cache/ {
        proxy_pass http://$bazel_remote/cache/;
    }

    # ── Health / readiness probe ──────────────────────────────────────────────
    location /health {
        access_log  off;
        return 200  "OK\n";
        add_header  Content-Type  text/plain;
    }
}

# ─── gRPC server — bazel-remote REAPI gRPC ───────────────────────────────────
# Bazel connects here for CAS / AC / ByteStream gRPC calls.

server {
    listen  9093;
    http2   on;
    server_name  _;

    grpc_connect_timeout  60s;
    grpc_read_timeout     3600s;
    grpc_send_timeout     3600s;

    set $bazel_remote_grpc "bazel-remote:9092";

    location / {
        grpc_pass grpc://$bazel_remote_grpc;
    }
}
